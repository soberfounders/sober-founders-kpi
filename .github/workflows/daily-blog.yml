name: Daily Blog Publish

on:
  schedule:
    - cron: '0 14 * * *'  # 10 AM ET (UTC-4) daily
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Publish daily blog post
        run: node scripts/daily-publish.mjs
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit calendar and log updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- package-lock.json || true
          git add scripts/content-calendar.json scripts/logs/
          git diff --staged --quiet || git commit -m "chore: daily blog publish $(date +%Y-%m-%d)"
          git push
